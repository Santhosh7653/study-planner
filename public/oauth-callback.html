<!DOCTYPE html>
<html>
<head><title>Connecting...</title></head>
<body>
<script>
  const params = new URLSearchParams(window.location.search)
  const code = params.get('code')
  const error = params.get('error')

  if (window.opener) {
    if (code) {
      // Use '*' because this page doesn't know the app origin at runtime.
      // The opener validates event.origin before trusting the message.
      window.opener.postMessage({ type: 'GOOGLE_OAUTH_CODE', code }, '*')
    } else if (error) {
      window.opener.postMessage({ type: 'GOOGLE_OAUTH_ERROR', error }, '*')
    }
  }

  window.close()
</script>
<p style="font-family:sans-serif;text-align:center;margin-top:40px;color:#6b7280;">
  Connecting to Google Calendar...
</p>
</body>
</html>
